<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="500" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A2744">
    HÌNH 1 · Grip Type → Contact Point → Ball Trajectory
  </text>
  <line x1="60" y1="48" x2="840" y2="48" stroke="#B8A04A" stroke-width="2"/>

  <!-- ══════════════ LEFT PANEL: UPPER CONTACT ══════════════ -->
  <rect x="60" y="64" width="370" height="390" rx="10" fill="#EEF3FB" stroke="#1A2744" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A2744">Continental / Eastern Grip</text>
  <text x="245" y="112" text-anchor="middle" font-size="12" fill="#C0392B" font-weight="bold">UPPER String Bed Contact</text>

  <!-- Racket frame LEFT -->
  <!-- Head ellipse -->
  <ellipse cx="220" cy="240" rx="68" ry="90" fill="none" stroke="#1A2744" stroke-width="3"/>
  <!-- Center line -->
  <line x1="220" y1="152" x2="220" y2="328" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- String grid (simplified) -->
  <line x1="160" y1="190" x2="280" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="148" y1="215" x2="292" y2="215" stroke="#aaa" stroke-width="1"/>
  <line x1="153" y1="240" x2="287" y2="240" stroke="#888" stroke-width="1.5"/><!-- center -->
  <line x1="148" y1="265" x2="292" y2="265" stroke="#aaa" stroke-width="1"/>
  <line x1="160" y1="290" x2="280" y2="290" stroke="#aaa" stroke-width="1"/>
  <!-- vertical strings -->
  <line x1="190" y1="155" x2="185" y2="327" stroke="#aaa" stroke-width="1"/>
  <line x1="210" y1="153" x2="208" y2="328" stroke="#aaa" stroke-width="1"/>
  <line x1="230" y1="153" x2="228" y2="328" stroke="#aaa" stroke-width="1"/>
  <line x1="250" y1="155" x2="253" y2="327" stroke="#aaa" stroke-width="1"/>

  <!-- UPPER contact zone highlight -->
  <ellipse cx="220" cy="196" rx="42" ry="22" fill="#C0392B" fill-opacity="0.18" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="270" y="192" font-size="10" fill="#C0392B" font-weight="bold">UPPER</text>
  <text x="270" y="204" font-size="10" fill="#C0392B">(above center)</text>

  <!-- Ball at contact point -->
  <circle cx="220" cy="196" r="10" fill="#CFE300" stroke="#888" stroke-width="1.5"/>

  <!-- Racket handle -->
  <rect x="210" y="326" width="20" height="70" rx="4" fill="#5D4037" stroke="#3E2723" stroke-width="1.5"/>
  <rect x="214" y="390" width="12" height="14" rx="2" fill="#3E2723"/>

  <!-- Swing path arrow: flat-ish -->
  <path d="M 145 260 Q 175 215 220 196" stroke="#1A2744" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="220,186 215,200 225,200" fill="#1A2744"/>

  <!-- Ball trajectory arrow: flatter -->
  <path d="M 220 196 Q 290 175 360 155" stroke="#2980B9" stroke-width="2.2" fill="none"/>
  <polygon points="360,155 348,150 350,162" fill="#2980B9"/>
  <text x="295" y="148" font-size="10" fill="#2980B9">Quỹ đạo phẳng</text>

  <!-- Torque label -->
  <text x="110" y="310" font-size="10" fill="#7D3C98">↑ Torque: đầu vợt</text>
  <text x="110" y="323" font-size="10" fill="#7D3C98">bật ra sau</text>

  <!-- Error margin note -->
  <rect x="78" y="400" width="334" height="44" rx="6" fill="#FDECEA" stroke="#C0392B" stroke-width="1"/>
  <text x="245" y="417" text-anchor="middle" font-size="10" fill="#C0392B" font-weight="bold">⚠  Biên độ lỗi hẹp</text>
  <text x="245" y="434" text-anchor="middle" font-size="10" fill="#7B241C">Mặt vợt sai ±2–3° → bóng dài HOẶC rúc lưới</text>

  <!-- ══════════════ RIGHT PANEL: LOWER CONTACT ══════════════ -->
  <rect x="470" y="64" width="370" height="390" rx="10" fill="#EBF5EB" stroke="#1A2744" stroke-width="1.5"/>
  <text x="655" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A2744">Semi-Western / Western Grip</text>
  <text x="655" y="112" text-anchor="middle" font-size="12" fill="#1A7A34" font-weight="bold">LOWER String Bed Contact</text>

  <!-- Racket frame RIGHT (slightly closed = tilted) -->
  <ellipse cx="630" cy="240" rx="68" ry="90" fill="none" stroke="#1A2744" stroke-width="3"/>
  <!-- Center line -->
  <line x1="630" y1="152" x2="630" y2="328" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- String grid -->
  <line x1="570" y1="190" x2="690" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="558" y1="215" x2="702" y2="215" stroke="#aaa" stroke-width="1"/>
  <line x1="563" y1="240" x2="697" y2="240" stroke="#888" stroke-width="1.5"/>
  <line x1="558" y1="265" x2="702" y2="265" stroke="#aaa" stroke-width="1"/>
  <line x1="570" y1="290" x2="690" y2="290" stroke="#aaa" stroke-width="1"/>
  <line x1="600" y1="155" x2="595" y2="327" stroke="#aaa" stroke-width="1"/>
  <line x1="620" y1="153" x2="618" y2="328" stroke="#aaa" stroke-width="1"/>
  <line x1="640" y1="153" x2="638" y2="328" stroke="#aaa" stroke-width="1"/>
  <line x1="660" y1="155" x2="663" y2="327" stroke="#aaa" stroke-width="1"/>

  <!-- LOWER contact zone highlight -->
  <ellipse cx="630" cy="272" rx="42" ry="20" fill="#1A7A34" fill-opacity="0.18" stroke="#1A7A34" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="680" y="268" font-size="10" fill="#1A7A34" font-weight="bold">LOWER</text>
  <text x="680" y="280" font-size="10" fill="#1A7A34">(below center)</text>

  <!-- Ball at contact point -->
  <circle cx="630" cy="272" r="10" fill="#CFE300" stroke="#888" stroke-width="1.5"/>

  <!-- Racket handle -->
  <rect x="620" y="326" width="20" height="70" rx="4" fill="#5D4037" stroke="#3E2723" stroke-width="1.5"/>
  <rect x="624" y="390" width="12" height="14" rx="2" fill="#3E2723"/>

  <!-- Swing path arrow: steep upward -->
  <path d="M 555 330 Q 575 300 630 272" stroke="#1A2744" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <polygon points="630,262 625,276 635,276" fill="#1A2744"/>

  <!-- Ball trajectory: high arc -->
  <path d="M 630 272 Q 690 210 770 195" stroke="#27AE60" stroke-width="2.2" fill="none"/>
  <polygon points="770,195 758,192 762,204" fill="#27AE60"/>
  <text x="695" y="207" font-size="10" fill="#27AE60">Topspin arc</text>

  <!-- Kick up arrow -->
  <path d="M 648 265 Q 665 240 660 215" stroke="#F39C12" stroke-width="1.8" fill="none"/>
  <polygon points="660,215 655,228 665,226" fill="#F39C12"/>
  <text x="665" y="212" font-size="10" fill="#F39C12">kicks up</text>

  <!-- Torque label -->
  <text x="488" y="310" font-size="10" fill="#7D3C98">↓ Torque: đầu vợt</text>
  <text x="488" y="323" font-size="10" fill="#7D3C98">cụp xuống → spin bù</text>

  <!-- Safety margin note -->
  <rect x="488" y="400" width="334" height="44" rx="6" fill="#E8F8E8" stroke="#1A7A34" stroke-width="1"/>
  <text x="655" y="417" text-anchor="middle" font-size="10" fill="#1A7A34" font-weight="bold">✓  Biên độ lỗi rộng hơn 30–40%</text>
  <text x="655" y="434" text-anchor="middle" font-size="10" fill="#145A32">Topspin tự tạo safety margin → bóng vượt lưới</text>

  <!-- ══════ CENTER DIVIDER ARROW ══════ -->
  <text x="450" y="248" text-anchor="middle" font-size="20" fill="#B8A04A">→</text>
  <text x="450" y="262" text-anchor="middle" font-size="9" fill="#888">grip</text>
  <text x="450" y="273" text-anchor="middle" font-size="9" fill="#888">change</text>

  <!-- Footer -->
  <text x="450" y="490" text-anchor="middle" font-size="10" fill="#888">Tennis Future Lab · Henry Pham · 2026 Edition</text>
</svg>
